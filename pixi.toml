[workspace]
name = "mojo-kafka"
version = "0.1.0"
description = "Apache Kafka client for Mojo — librdkafka bindings"
authors = ["Dvir Arad <dvirarad@users.noreply.github.com>"]
channels = ["https://conda.modular.com/max", "conda-forge"]
platforms = ["linux-64", "osx-arm64"]
license = "Apache-2.0"

[tasks]
example-producer = "mojo run examples/producer_basic.mojo"
example-consumer = "mojo run examples/consumer_basic.mojo"
example-ml = "mojo run examples/ml_pipeline.mojo"
lint = "mojo format src/ examples/ tests/"
package = "mojo package src/kafka -o dist/kafka.mojopkg"
test = "mojo run tests/test_smoke.mojo"

[dependencies]
max = ">=24.6"
librdkafka = ">=2.3.0"
