name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pixi
        run: |
          curl -fsSL https://pixi.sh/install.sh | bash
          echo "$HOME/.pixi/bin" >> $GITHUB_PATH

      - name: Resolve env
        run: pixi install

      - name: Mojo version
        run: pixi run -- mojo --version

      - name: Format check
        run: |
          pixi run -- mojo format src/ examples/ tests/
          if ! git diff --quiet; then
            echo "::error::Formatting drift — run 'pixi run -- mojo format src/ examples/ tests/' locally and commit."
            git --no-pager diff
            exit 1
          fi

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install pixi
        run: |
          curl -fsSL https://pixi.sh/install.sh | bash
          echo "$HOME/.pixi/bin" >> $GITHUB_PATH

      - name: Resolve env
        run: pixi install

      - name: Mojo version
        run: pixi run -- mojo --version

      - name: Build .mojopkg
        run: |
          mkdir -p dist
          pixi run -- mojo package src/kafka -o dist/kafka.mojopkg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kafka-${{ matrix.os }}.mojopkg
          path: dist/kafka.mojopkg
          if-no-files-found: error
          retention-days: 7
