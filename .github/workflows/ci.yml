name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install pixi
        run: |
          curl -fsSL https://pixi.sh/install.sh | bash
          echo "$HOME/.pixi/bin" >> $GITHUB_PATH

      - name: Resolve env
        run: pixi install

      - name: Mojo version
        run: pixi run -- mojo --version

      - name: Format check
        run: |
          pixi run -- mojo format src/ examples/ tests/
          if ! git diff --quiet; then
            echo "::error::Formatting drift — run 'pixi run -- mojo format src/ examples/ tests/' locally and commit."
            git --no-pager diff
            exit 1
          fi

  env-check:
    name: Env (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v5

      - name: Install pixi
        run: |
          curl -fsSL https://pixi.sh/install.sh | bash
          echo "$HOME/.pixi/bin" >> $GITHUB_PATH

      - name: Resolve env
        run: pixi install

      - name: Mojo version
        run: pixi run -- mojo --version

      - name: librdkafka headers present
        run: |
          test -f "$(pixi run -- bash -c 'echo $CONDA_PREFIX')/include/librdkafka/rdkafka.h"
          echo "✓ rdkafka.h resolves inside the pixi env"
