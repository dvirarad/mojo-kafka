name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pixi
        run: |
          curl -fsSL https://pixi.sh/install.sh | bash
          echo "$HOME/.pixi/bin" >> $GITHUB_PATH

      - name: Resolve env
        run: pixi install

      - name: Mojo format check
        run: |
          pixi run lint || \
            (echo "::error::Run 'pixi run -- mojo format src/ examples/ tests/' to fix" && exit 1)

  smoke:
    name: Smoke tests (no broker)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install pixi
        run: |
          curl -fsSL https://pixi.sh/install.sh | bash
          echo "$HOME/.pixi/bin" >> $GITHUB_PATH

      - name: Resolve env
        run: pixi install

      - name: Run smoke tests
        run: pixi run test

  integration:
    name: Integration (against live Kafka)
    runs-on: ubuntu-latest
    needs: smoke
    services:
      kafka:
        image: apache/kafka:3.7.0
        ports:
          - 9092:9092
        options: >-
          --health-cmd "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Install pixi
        run: |
          curl -fsSL https://pixi.sh/install.sh | bash
          echo "$HOME/.pixi/bin" >> $GITHUB_PATH

      - name: Resolve env
        run: pixi install

      - name: Wait for Kafka
        run: |
          for i in $(seq 1 30); do
            nc -z localhost 9092 && echo "kafka up" && exit 0
            sleep 2
          done
          echo "kafka never came up" && exit 1

      - name: Run integration tests
        env:
          KAFKA_BOOTSTRAP: localhost:9092
        run: pixi run test
